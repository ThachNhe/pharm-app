services:
  frontend:
    build:
      context: ./frontend
      target: dev
    container_name: pharm-frontend-dev
    env_file:
      - ./env/dev/frontend.env
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    container_name: pharm-backend-dev
    command: yarn dev:docker
    restart: unless-stopped

  postgres:
    container_name: pharm-db-dev

  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: pharm-mailhog-dev
    ports:
      - "${MAILHOG_PORT:-8025}:8025"
      - "1025:1025"
    restart: unless-stopped

volumes:
  frontend_node_modules:
