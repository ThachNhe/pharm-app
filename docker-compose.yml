services:
  backend:
    build:
      context: ./backend
    image: backend
    container_name: pharm-backend
    restart: unless-stopped
    env_file:
      - ./env/dev/backend.env
    environment:
      - DATABASE_URL=${DATABASE_URL}
    ports:
      - '3000:3000'
    depends_on:
      - postgres
    volumes:
      - ./backend:/usr/src/node-app
      - backend_node_modules:/usr/src/node-app/node_modules
    networks:
      - node-network

  postgres:
    image: postgres:16-alpine
    container_name: pharm-postgres-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    networks:
      - node-network

volumes:
  postgres-data:
  backend_node_modules:

networks:
  node-network:
    driver: bridge
